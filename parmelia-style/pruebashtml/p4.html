<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  body {
    background-color: #121212;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
  }

  /* Contenedor principal para manejar la perspectiva */
  .velocity-container {
    position: relative;
    width: 300px;
    height: 300px;
  }

  /* El logo tiene una vibración controlada para simular resistencia aerodinámica/impulso */
  .logo-wrapper {
    position: absolute;
    top: 50px;
    left: 50px;
    width: 200px;
    height: 200px;
    animation: engine-vibrate 0.1s infinite alternate;
    z-index: 10;
  }

  /* Líneas de velocidad (Estelas de luz) */
  .speed-line {
    position: absolute;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
    height: 2px;
    border-radius: 50%;
    transform: rotate(-30deg); /* Alineado con la isometría del logo */
    opacity: 0;
  }

  /* Animaciones individuales para crear un flujo constante y aleatorio */
  .line-1 { top: 30%; left: -50%; width: 150px; background: linear-gradient(90deg, transparent, #A7D4DE, transparent); animation: shoot 0.8s linear infinite; }
  .line-2 { top: 60%; left: -20%; width: 100px; background: linear-gradient(90deg, transparent, #DEA6BC, transparent); animation: shoot 1.2s linear infinite 0.3s; }
  .line-3 { top: 80%; left: 0%; width: 200px; background: linear-gradient(90deg, transparent, #DED9A6, transparent); animation: shoot 0.6s linear infinite 0.5s; }
  .line-4 { top: 20%; left: 20%; width: 120px; background: linear-gradient(90deg, transparent, #FFFFFF, transparent); animation: shoot 1s linear infinite 0.1s; }
  .line-5 { top: 90%; left: -40%; width: 80px; background: linear-gradient(90deg, transparent, #A7D4DE, transparent); animation: shoot 0.9s linear infinite 0.7s; }

  @keyframes engine-vibrate {
    0% { transform: translate(0, 0); }
    100% { transform: translate(1px, -1px); }
  }

  @keyframes shoot {
    0% { transform: rotate(-30deg) translateX(-100px); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: rotate(-30deg) translateX(400px); opacity: 0; }
  }
</style>
</head>
<body>

  <div class="velocity-container">
    <div class="speed-line line-1"></div>
    <div class="speed-line line-2"></div>
    <div class="speed-line line-3"></div>
    <div class="speed-line line-4"></div>
    <div class="speed-line line-5"></div>

    <div class="logo-wrapper">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <g transform="translate(0, 10)">
          <polygon points="100,10 180,50 100,90 20,50" fill="#A7D4DE"/>
          <path d="M20,65
