<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parmelia - Sistema de Animaciones SVG</title>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Antique&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #A7D4DE;
            --pink: #DEA6BC;
            --yellow: #DED9A6;
            --bg-dark: #121212;
            --bg-deep: #050505;
        }

        body {
            background-color: var(--bg-deep);
            color: #FFFFFF;
            font-family: 'Shippori Antique', sans-serif;
            margin: 0;
            padding: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .card {
            background-color: var(--bg-dark);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .card-title {
            font-size: 14px;
            margin-bottom: 20px;
            align-self: flex-start;
            color: rgba(255, 255, 255, 0.7);
        }

        /* =========================================
     1. Ensamblaje del Cubo
     ========================================= */
        .anim-assembly .layer-a-blue {
            animation: assemble-blue 3s ease-in-out infinite alternate;
        }

        .anim-assembly .layer-a-pink {
            animation: assemble-pink 3s ease-in-out infinite alternate;
        }

        .anim-assembly .layer-a-yellow {
            animation: assemble-yellow 3s ease-in-out infinite alternate;
        }

        @keyframes assemble-blue {
            0% {
                transform: translateY(-40px);
                opacity: 0;
            }

            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes assemble-pink {
            0% {
                transform: translateY(-20px);
                opacity: 0;
            }

            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes assemble-yellow {
            0% {
                transform: translateY(20px);
                opacity: 0;
            }

            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* =========================================
     2. Separación de Capas
     ========================================= */
        .anim-separation:hover .layer-s-blue {
            transform: translate(15px, -15px);
        }

        .anim-separation:hover .layer-s-pink {
            transform: translate(30px, -5px);
        }

        .anim-separation:hover .layer-s-yellow {
            transform: translate(45px, 5px);
        }

        .layer-s {
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* =========================================
     3. Flujo de Rayas (Background)
     ========================================= */
        .stripe-bg {
            width: 100%;
            height: 150px;
            background: repeating-linear-gradient(-45deg,
                    var(--bg-dark), var(--bg-dark) 10px,
                    rgba(167, 212, 222, 0.1) 10px, rgba(167, 212, 222, 0.1) 20px,
                    rgba(222, 166, 188, 0.1) 20px, rgba(222, 166, 188, 0.1) 30px,
                    rgba(222, 217, 166, 0.1) 30px, rgba(222, 217, 166, 0.1) 40px);
            background-size: 56px 56px;
            animation: flow-stripes 3s linear infinite;
        }

        @keyframes flow-stripes {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 56px 56px;
            }
        }

        /* =========================================
     4. Constelación de Red
     ========================================= */
        .net-node {
            animation: pulse-node 2s infinite alternate;
        }

        .net-line {
            stroke-dasharray: 100;
            animation: draw-line 3s linear infinite;
        }

        @keyframes draw-line {
            0% {
                stroke-dashoffset: 100;
                opacity: 0;
            }

            50% {
                opacity: 1;
            }

            100% {
                stroke-dashoffset: -100;
                opacity: 0;
            }
        }

        @keyframes pulse-node {
            0% {
                r: 2;
                opacity: 0.5;
            }

            100% {
                r: 4;
                opacity: 1;
            }
        }

        /* =========================================
     5. Revelación de Bóveda
     ========================================= */
        .vault-shield {
            transform-origin: center;
            transform: scale(0);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .anim-vault:hover .vault-shield {
            transform: scale(1);
        }

        .anim-vault:hover .vault-cover {
            opacity: 0.3;
            transition: opacity 0.5s;
        }

        /* =========================================
     6. Cambio de Perspectiva (3D)
     ========================================= */
        .anim-perspective {
            transform-style: preserve-3d;
            animation: rotate-3d 8s linear infinite;
        }

        @keyframes rotate-3d {
            0% {
                transform: perspective(600px) rotateY(0deg) rotateX(10deg);
            }

            50% {
                transform: perspective(600px) rotateY(15deg) rotateX(-10deg);
            }

            100% {
                transform: perspective(600px) rotateY(0deg) rotateX(10deg);
            }
        }

        /* =========================================
     7. Interacción Hover Brillante
     ========================================= */
        .anim-hover {
            transition: filter 0.3s ease, transform 0.3s ease;
            cursor: pointer;
        }

        .anim-hover:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 0 15px rgba(167, 212, 222, 0.6)) drop-shadow(0 0 5px rgba(222, 166, 188, 0.4));
        }

        /* =========================================
     8. Pila Infinita (Loader)
     ========================================= */
        .loader-layer {
            animation: infinite-stack 1.5s ease-in-out infinite;
            transform-origin: center;
        }

        .loader-layer:nth-child(1) {
            animation-delay: 0s;
            fill: var(--cyan);
        }

        .loader-layer:nth-child(2) {
            animation-delay: 0.5s;
            fill: var(--pink);
        }

        .loader-layer:nth-child(3) {
            animation-delay: 1s;
            fill: var(--yellow);
        }

        @keyframes infinite-stack {
            0% {
                transform: translateY(-30px) scale(0.8);
                opacity: 0;
            }

            50% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }

            100% {
                transform: translateY(30px) scale(0.8);
                opacity: 0;
            }
        }

        /* =========================================
     9. Cubo Checkmark (Confirmación)
     ========================================= */
        .check-path {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            transition: stroke-dashoffset 0.6s ease-in-out;
        }

        .anim-check:hover .check-path {
            stroke-dashoffset: 0;
        }

        .anim-check:hover .base-logo {
            opacity: 0.2;
            transition: opacity 0.3s;
        }

        /* =========================================
     10. Transferencia de Datos
     ========================================= */
        .transfer-orb {
            animation: transfer-data 2s cubic-bezier(0.45, 0, 0.55, 1) infinite;
        }

        @keyframes transfer-data {
            0% {
                transform: translateX(30px);
                opacity: 0;
                fill: var(--cyan);
            }

            15% {
                opacity: 1;
            }

            50% {
                fill: var(--pink);
            }

            85% {
                opacity: 1;
            }

            100% {
                transform: translateX(130px);
                opacity: 0;
                fill: var(--yellow);
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="card-title">1. Ensamblaje del Cubo</div>
        <svg class="anim-assembly" width="150" height="150" viewBox="0 0 200 200">
            <g transform="translate(0, 10)">
                <polygon class="layer-a-blue" points="100,10 180,50 100,90 20,50" fill="var(--cyan)" />
                <path class="layer-a-pink" d="M20,65 L100,105 L180,65 L180,95 L100,135 L20,95 Z" fill="var(--pink)" />
                <path class="layer-a-yellow" d="M20,110 L100,150 L180,110 L180,140 L100,180 L20,140 Z"
                    fill="var(--yellow)" />
            </g>
        </svg>
    </div>

    <div class="card">
        <div class="card-title">2. Separación (Haz Hover)</div>
        <svg class="anim-separation" width="150" height="150" viewBox="-50 -50 300 300">
            <g transform="translate(0, 10)">
                <polygon class="layer-s layer-s-blue" points="100,10 180,50 100,90 20,50" fill="var(--cyan)" />
                <path class="layer-s layer-s-pink" d="M20,65 L100,105 L180,65 L180,95 L100,135 L20,95 Z"
                    fill="var(--pink)" />
                <path class="layer-s layer-s-yellow" d="M20,110 L100,150 L180,110 L180,140 L100,180 L20,140 Z"
                    fill="var(--yellow)" />
            </g>
        </svg>
    </div>

    <div class="card">
        <div class="card-title">3. Background Flow</div>
        <div class="stripe-bg"></div>
    </div>

    <div class="card">
        <div class="card-title">4. Red de Transacciones</div>
        <svg width="100%" height="150" viewBox="0 0 200 150">
            <line class="net-line" x1="20" y1="20" x2="100" y2="80" stroke="var(--cyan)" stroke-width="1" />
            <line class="net-line" x1="100" y1="80" x2="180" y2="40" stroke="var(--pink)" stroke-width="1"
                style="animation-delay: 1s;" />
            <line class="net-line" x1="50" y1="120" x2="100" y2="80" stroke="var(--yellow)" stroke-width="1"
                style="animation-delay: 0.5s;" />

            <circle class="net-node" cx="20" cy="20" r="3" fill="var(--cyan)" />
            <circle class="net-node" cx="100" cy="80" r="4" fill="#FFFFFF" />
            <circle class="net-node" cx="180" cy="40" r="3" fill="var(--pink)" />
            <circle class="net-node" cx="50" cy="120" r="3" fill="var(--yellow)" />
        </svg>
    </div>

    <div class="card">
        <div class="card-title">5. Revelación Bóveda (Hover)</div>
        <svg class="anim-vault" width="150" height="150" viewBox="0 0 200 200">
            <g transform="translate(0, 10)">
                <g class="vault-cover">
                    <polygon points="100,10 180,50 100,90 20,50" fill="var(--cyan)" />
                    <path d="M20,65 L100,105 L180,65 L180,95 L100,135 L20,95 Z" fill="var(--pink)" />
                    <path d="M20,110 L100,150 L180,110 L180,140 L100,180 L20,140 Z" fill="var(--yellow)" />
                </g>
                <path class="vault-shield"
                    d="M100,50 L140,70 L140,110 C140,140 100,160 100,160 C100,160 60,140 60,110 L60,70 Z" fill="none"
                    stroke="#FFFFFF" stroke-width="8" stroke-linejoin="round" />
            </g>
        </svg>
    </div>

    <div class="card">
        <div class="card-title">6. Escáner de Perspectiva</div>
        <svg class="anim-perspective" width="150" height="150" viewBox="0 0 200 200">
            <g transform="translate(0, 10)">
                <polygon points="100,10 180,50 100,90 20,50" fill="var(--cyan)" />
                <path d="M20,65 L100,105 L180,65 L180,95 L100,135 L20,95 Z" fill="var(--pink)" />
                <path d="M20,110 L100,150 L180,110 L180,140 L100,180 L20,140 Z" fill="var(--yellow)" />
            </g>
        </svg>
    </div>

    <div class="card">
        <div class="card-title">7. Glowing Hover (Pasa el ratón)</div>
        <svg class="anim-hover" width="150" height="150" viewBox="0 0 200 200">
            <g transform="translate(0, 10)">
                <polygon points="100,10 180,50 100,90 20,50" fill="var(--cyan)" />
                <path d="M20,65 L100,105 L180,65 L180,95 L100,135 L20,95 Z" fill="var(--pink)" />
                <path d="M20,110 L100,150 L180,110 L180,140 L100,180 L20,140 Z" fill="var(--yellow)" />
            </g>
        </svg>
    </div>

    <div class="card">
        <div class="card-title">8. Loader Pila Infinita</div>
        <svg width="150" height="150" viewBox="0 0 200 200">
            <g transform="translate(0, 50)">
                <polygon class="loader-layer" points="100,10 180,50 100,90 20,50" />
                <polygon class="loader-layer" points="100,10 180,50 100,90 20,50" />
                <polygon class="loader-layer" points="100,10 180,50 100,90 20,50" />
            </g>
        </svg>
    </div>

    <div class="card">
        <div class="card-title">9. Confirmación (Hover)</div>
        <svg class="anim-check" width="150" height="150" viewBox="0 0 200 200">
            <g class="base-logo" transform="translate(0, 10)">
                <polygon points="100,10 180,50 100,90 20,50" fill="var(--cyan)" />
                <path d="M20,65 L100,105 L180,65 L180,95 L100,135 L20,95 Z" fill="var(--pink)" />
                <path d="M20,110 L100,150 L180,110 L180,140 L100,180 L20,140 Z" fill="var(--yellow)" />
            </g>
            <polyline class="check-path" points="60,100 90,130 150,60" fill="none" stroke="var(--cyan)"
                stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
    </div>

    <div class="card">
        <div class="card-title">10. Transferencia (P2P)</div>
        <svg width="200" height="150" viewBox="0 0 200 150">
            <g transform="translate(10, 50) scale(0.3)">
                <polygon points="100,10 180,50 100,90 20,50" fill="var(--cyan)" />
                <path d="M20,65 L100,105 L180,65 L180,95 L100,135 L20,95 Z" fill="var(--pink)" />
                <path d="M20,110 L100,150 L180,110 L180,140 L100,180 L20,140 Z" fill="var(--yellow)" />
            </g>

            <circle class="transfer-orb" cx="20" cy="75" r="8" filter="drop-shadow(0 0 5px currentColor)" />
            <line x1="60" y1="75" x2="140" y2="75" stroke="rgba(255,255,255,0.2)" stroke-width="2"
                stroke-dasharray="4" />

            <g transform="translate(130, 50) scale(0.3)">
                <polygon points="100,10 180,50 100,90 20,50" fill="var(--cyan)" />
                <path d="M20,65 L100,105 L180,65 L180,95 L100,135 L20,95 Z" fill="var(--pink)" />
                <path d="M20,110 L100,150 L180,110 L180,140 L100,180 L20,140 Z" fill="var(--yellow)" />
            </g>
        </svg>
    </div>

</body>

</html>
