<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parmelia - Sistema de Animaciones SVG (Parte 2)</title>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Antique&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #A7D4DE;
            --pink: #DEA6BC;
            --yellow: #DED9A6;
            --bg-dark: #121212;
            --bg-deep: #050505;
        }

        body {
            background-color: var(--bg-deep);
            color: #FFFFFF;
            font-family: 'Shippori Antique', sans-serif;
            margin: 0;
            padding: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .card {
            background-color: var(--bg-dark);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .card-title {
            font-size: 14px;
            margin-bottom: 20px;
            align-self: flex-start;
            color: rgba(255, 255, 255, 0.7);
        }

        /* =========================================
     11. Órbita Descentralizada (Nodos)
     ========================================= */
        .orbit-container {
            transform-origin: center;
            animation: spin-orbit 8s linear infinite;
        }

        .orbit-node {
            animation: counter-spin 8s linear infinite;
            transform-origin: center;
        }

        @keyframes spin-orbit {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes counter-spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(-360deg);
            }
        }

        /* =========================================
     12. Crecimiento de Staking (Yield)
     ========================================= */
        .stake-layer {
            opacity: 0.3;
            transform-origin: bottom;
            animation: grow-stake 3s ease-in-out infinite alternate;
        }

        .stake-layer:nth-child(2) {
            animation-delay: 0.5s;
            fill: var(--cyan);
        }

        .stake-layer:nth-child(3) {
            animation-delay: 1s;
            fill: var(--pink);
        }

        .stake-layer:nth-child(4) {
            animation-delay: 1.5s;
            fill: var(--yellow);
            opacity: 1;
        }

        @keyframes grow-stake {
            0% {
                transform: translateY(0);
                opacity: 0;
            }

            100% {
                transform: translateY(-30px);
                opacity: 1;
            }
        }

        /* =========================================
     13. Puente Cross-Chain
     ========================================= */
        .bridge-line {
            stroke-dasharray: 10;
            animation: flow-bridge 1s linear infinite;
        }

        @keyframes flow-bridge {
            0% {
                stroke-dashoffset: 20;
            }

            100% {
                stroke-dashoffset: 0;
            }
        }

        /* =========================================
     14. Acelerador de Transacciones
     ========================================= */
        .accelerator-ring {
            transform-origin: center;
        }

        .ring-1 {
            animation: accel-spin 2s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        .ring-2 {
            animation: accel-spin 3s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite reverse;
        }

        @keyframes accel-spin {
            0% {
                transform: rotateX(60deg) rotateZ(0deg);
            }

            100% {
                transform: rotateX(60deg) rotateZ(360deg);
            }
        }

        /* =========================================
     15. Tap-to-Pay / Emisión NFC
     ========================================= */
        .nfc-wave {
            transform-origin: center;
            animation: nfc-pulse 2s ease-out infinite;
            opacity: 0;
        }

        .nfc-wave:nth-child(1) {
            animation-delay: 0s;
        }

        .nfc-wave:nth-child(2) {
            animation-delay: 0.3s;
        }

        .nfc-wave:nth-child(3) {
            animation-delay: 0.6s;
        }

        @keyframes nfc-pulse {
            0% {
                transform: scale(0.5) translate(30px, -30px);
                opacity: 1;
                stroke-width: 4;
            }

            100% {
                transform: scale(1.5) translate(30px, -30px);
                opacity: 0;
                stroke-width: 1;
            }
        }

        /* =========================================
     16. Firma Multi-Sig (Convergencia)
     ========================================= */
        .sig-dot {
            animation: converge-sig 2.5s ease-in-out infinite;
        }

        .sig-core {
            animation: flash-core 2.5s ease-in-out infinite;
        }

        @keyframes converge-sig {
            0% {
                transform: translate(0, 0);
                opacity: 0;
            }

            40% {
                opacity: 1;
            }

            50% {
                transform: translate(100px, 100px);
                opacity: 0;
            }

            100% {
                transform: translate(100px, 100px);
                opacity: 0;
            }
        }

        @keyframes flash-core {

            0%,
            45% {
                filter: drop-shadow(0 0 0 transparent);
            }

            50% {
                filter: drop-shadow(0 0 15px var(--cyan));
                transform: scale(1.1);
            }

            100% {
                filter: drop-shadow(0 0 0 transparent);
                transform: scale(1);
            }
        }

        /* =========================================
     17. Ejecución de Smart Contract
     ========================================= */
        .contract-block {
            animation: process-contract 3s ease-in-out infinite;
        }

        @keyframes process-contract {
            0% {
                transform: translateY(-50px);
                opacity: 0;
                fill: #FFFFFF;
            }

            20% {
                transform: translateY(10px);
                opacity: 1;
                fill: #FFFFFF;
            }

            50% {
                transform: translateY(10px);
                fill: var(--cyan);
            }

            80% {
                transform: translateY(80px);
                opacity: 1;
                fill: var(--cyan);
            }

            100% {
                transform: translateY(100px);
                opacity: 0;
                fill: var(--cyan);
            }
        }

        /* =========================================
     18. Latido del Protocolo (Uptime)
     ========================================= */
        .ekg-line {
            stroke-dasharray: 600;
            stroke-dashoffset: 600;
            animation: heartbeat 4s linear infinite;
        }

        @keyframes heartbeat {
            0% {
                stroke-dashoffset: 600;
            }

            50% {
                stroke-dashoffset: 0;
            }

            100% {
                stroke-dashoffset: -600;
            }
        }

        /* =========================================
     19. Escudo Hexagonal (Seguridad Activa)
     ========================================= */
        .hex-shield {
            stroke-dasharray: 10 20;
            animation: rotate-shield 10s linear infinite;
            transform-origin: center;
        }

        .anim-shield:hover .hex-shield {
            stroke-dasharray: 50 0;
            filter: drop-shadow(0 0 8px var(--cyan));
        }

        @keyframes rotate-shield {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* =========================================
     20. Partículas de Gas/Optimización
     ========================================= */
        .gas-particle {
            animation: burn-gas 2s ease-in infinite;
            opacity: 0;
        }

        .gas-particle:nth-child(1) {
            animation-delay: 0.1s;
        }

        .gas-particle:nth-child(2) {
            animation-delay: 0.7s;
        }

        .gas-particle:nth-child(3) {
            animation-delay: 1.2s;
        }

        @keyframes burn-gas {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
                fill: var(--pink);
            }

            100% {
                transform: translateY(-60px) scale(0);
                opacity: 0;
                fill: var(--yellow);
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="card-title">11. Descentralización (Nodos)</div>
        <svg width="150" height="150" viewBox="0 0 200 200">
            <g transform="translate(0, 10)">
                <polygon points="100,60 140,80 100,100 60,80" fill="var(--cyan)" />
                <g class="orbit-container" style="transform-origin: 100px 90px;">
                    <circle cx="100" cy="20" r="8" fill="var(--pink)" class="orbit-node"
                        style="transform-origin: 100px 20px;" />
                    <circle cx="160" cy="130" r="6" fill="var(--yellow)" class="orbit-node"
                        style="transform-origin: 160px 130px;" />
                    <circle cx="40" cy="130" r="10" fill="#FFFFFF" class="orbit-node"
                        style="transform-origin: 40px 130px;" />
                </g>
            </g>
        </svg>
    </div>

    <div class="card">
        <div class="card-title">12. Staking / Crecimiento</div>
        <svg width="150" height="150" viewBox="0 0 200 200">
            <g transform="translate(0, 80)">
                <polygon class="stake-layer" points="100,10 180,50 100,90 20,50" fill="var(--bg-dark)" />
                <polygon class="stake-layer" points="100,10 180,50 100,90 20,50" />
                <polygon class="stake-layer" points="100,10 180,50 100,90 20,50" />
                <polygon class="stake-layer" points="100,10 180,50 100,90 20,50" />
            </g>
        </svg>
    </div>

    <div class="card">
        <div class="card-title">13. Puente Cross-Chain</div>
        <svg width="200" height="150" viewBox="0 0 200 150">
            <polygon points="40,60 70,75 40,90 10,75" fill="var(--pink)" />
            <polygon points="160,60 190,75 160,90 130,75" fill="var(--cyan)" />
            <path class="bridge-line" d="M 55,68 Q 100,20 145,68" fill="none" stroke="var(--yellow)" stroke-width="3"
                stroke-linecap="round" />
            <path class="bridge-line" d="M 55,82 Q 100,130 145,82" fill="none" stroke="var(--yellow)" stroke-width="3"
                stroke-linecap="round" />
        </svg>
    </div>

    <div class="card">
        <div class="card-title">14. Acelerador de Transacciones</div>
        <svg width="150" height="150" viewBox="0 0 200 200">
            <g transform="translate(0, 10)">
                <circle class="accelerator-ring ring-1" cx="100" cy="100" r="70" fill="none" stroke="var(--cyan)"
                    stroke-width="2" stroke-dasharray="10 20" style="transform-origin: 100px 100px;" />
                <circle class="accelerator-ring ring-2" cx="100" cy="100" r="85" fill="none" stroke="var(--pink)"
                    stroke-width="4" stroke-dasharray="30 40" style="transform-origin: 100px 100px;" />
                <polygon points="100,70 140,90 100,110 60,90" fill="var(--yellow)" />
            </g>
        </svg>
    </div>

    <div class="card">
        <div class="card-title">15. Emisión Tap-to-Pay</div>
        <svg width="150" height="150" viewBox="0 0 200 200">
            <g transform="translate(0, 10)">
                <polygon points="80,50 140,80 80,110 20,80" fill="var(--cyan)" />
                <path class="nfc-wave" d="M 120,50 Q 150,50 150,80" fill="none" stroke="#FFFFFF"
                    stroke-linecap="round" />
                <path class="nfc-wave" d="M 130,40 Q 170,40 170,80" fill="none" stroke="var(--pink)"
                    stroke-linecap="round" />
                <path class="nfc-wave" d="M 140,30 Q 190,30 190,80" fill="none" stroke="var(--yellow)"
                    stroke-linecap="round" />
            </g>
        </svg>
    </div>

    <div class="card">
        <div class="card-title">16. Firma Multi-Sig</div>
        <svg width="150" height="150" viewBox="0 0 200 200">
            <circle class="sig-dot" cx="20" cy="20" r="6" fill="var(--pink)" style="transform-origin: 20px 20px;" />
            <circle class="sig-dot" cx="180" cy="20" r="6" fill="var(--yellow)" style="transform-origin: 180px 20px;" />
            <circle class="sig-dot" cx="100" cy="180" r="6" fill="#FFFFFF" style="transform-origin: 100px 180px;" />
            <g class="sig-core" transform="translate(0, 10)" style="transform-origin: 100px 100px;">
                <polygon points="100,70 130,85 100,100 70,85" fill="var(--cyan)" />
            </g>
        </svg>
    </div>

    <div class="card">
        <div class="card-title">17. Ejecución de Contrato</div>
        <svg width="150" height="150" viewBox="0 0 200 200">
            <rect class="contract-block" x="80" y="20" width="40" height="10" rx="2" fill="#FFFFFF" />
            <g transform="translate(0, 10)">
                <polygon points="100,50 160,80 100,110 40,80" fill="none" stroke="var(--pink)" stroke-width="4" />
                <path d="M40,90 L100,120 L160,90" fill="none" stroke="var(--yellow)" stroke-width="4" />
            </g>
        </svg>
    </div>

    <div class="card">
        <div class="card-title">18. Latido del Protocolo</div>
        <svg width="100%" height="150" viewBox="0 0 300 150">
            <defs>
                <linearGradient id="ekg-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="var(--cyan)" />
                    <stop offset="50%" stop-color="var(--pink)" />
                    <stop offset="100%" stop-color="var(--yellow)" />
                </linearGradient>
            </defs>
            <path class="ekg-line" d="M 0,75 L 100,75 L 120,40 L 140,110 L 160,30 L 180,75 L 300,75" fill="none"
                stroke="url(#ekg-grad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
    </div>

    <div class="card anim-shield">
        <div class="card-title">19. Escudo Activo (Hover)</div>
        <svg width="150" height="150" viewBox="0 0 200 200">
            <g transform="translate(0, 10)">
                <polygon class="hex-shield" points="100,10 180,50 180,140 100,180 20,140 20,50" fill="none"
                    stroke="var(--cyan)" stroke-width="2"
                    style="transform-origin: 100px 95px; transition: stroke-dasharray 0.5s ease;" />
                <polygon points="100,60 140,80 100,100 60,80" fill="var(--yellow)" />
            </g>
        </svg>
    </div>

    <div class="card">
        <div class="card-title">20. Optimización (Eficiencia)</div>
        <svg width="150" height="150" viewBox="0 0 200 200">
            <g transform="translate(0, 10)">
                <polygon points="100,80 140,100 100,120 60,100" fill="var(--cyan)" />
                <circle class="gas-particle" cx="100" cy="90" r="8" />
                <circle class="gas-particle" cx="80" cy="110" r="5" />
                <circle class="gas-particle" cx="120" cy="100" r="10" />
            </g>
        </svg>
    </div>

</body>

</html>
